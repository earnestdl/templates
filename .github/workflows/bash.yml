on: 
  workflow_call: 
    inputs:
      appVersion: 
        required: true
        type: string

jobs:
  Build-BASH:
    runs-on: ubuntu-latest
    env:
      APPTYPE: bash
      APPVERSION: ${{ inputs.appVersion }}
    steps:

      - name: Validation
        uses: earnestdl/templates/.github/workflows/validation.yml@main
        with:
          event: prebuild

      - name: "List Variables"
        run: | 
          echo hello from BASH build template
          echo appType: $APPTYPE
          echo appVersion: $APPVERSION
      - name: Run script file
        run: |
          chmod +x ./src/script.sh
          ./src/script.sh
        shell: bash      

      - name: Compliance
        uses: earnestdl/templates/.github/workflows/compliance.yml@main
        with:
          event: postbuild
