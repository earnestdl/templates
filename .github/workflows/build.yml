on: 
  workflow_call: 
    inputs:
      appType:
        required: true
        type: string
      appVersion: 
        required: true
        type: string

jobs:
  Build:
    uses: earnestdl/templates/.github/workflows/$(APPTYPE).yml@main
    with:
      APPTYPE: ${{ inputs.appType}} 
      appVersion: ${{ inputs.appVersion }}
      
