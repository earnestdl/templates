on: 
  workflow_call: 
    inputs:
      appType:
        required: true
        type: string
      appVersion: 
        required: true
        type: string

jobs:

  validation:
    name: Validation
    uses: earnestdl/templates/.github/workflows/validation.yml@main
    with:
      event: prebuild

  bash:
    name: Build bash
    if: ${{ inputs.appType == 'bash' }} 
    uses: earnestdl/templates/.github/workflows/bash.yml@main
    secrets: inherit
    with:
      appVersion: ${{ inputs.appVersion }}

  compliance:
    name: Compliance
    uses: earnestdl/templates/.github/workflows/compliance.yml@main
    with:
      event: postbuild
